name: Run LOD Generation

on:
  push:
    branches:
      - feature/lod-generator-editor
  workflow_dispatch:
    inputs:
      coords:
        required: true
        default: "20,4"
        type: string
        description: "Scene parcel coordinates (x,y)"
      baseUrl:
        required: true
        default: "https://peer.decentraland.zone"
        type: string
        description: "Catalyst server URL"

jobs:
  generate-lod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN || github.token }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install scene-lod-entities-manifest-builder
        run: |
          cd scene-lod-entities-manifest-builder
          npm ci

      - name: Run LOD Generation
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: asset-bundle-converter
          unityVersion: 6000.2.6f2
          targetPlatform: WebGL
          buildMethod: DCL.ABConverter.Editor.LODGeneratorWindow.GenerateLODBatchMode
          customParameters: -coords ${{ inputs.coords || '20,4' }} -baseUrl ${{ inputs.baseUrl || 'https://peer.decentraland.zone' }}

      - name: Upload LOD artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lod-${{ inputs.coords || '20,4' }}
          path: |
            asset-bundle-converter/Assets/_ExportedLODs/LOD_Assets/**/*
