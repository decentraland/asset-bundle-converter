name: Run LOD Generation

on:
  push:
    branches:
      - feature/lod-generator-editor
  workflow_dispatch:
    inputs:
      coords:
        required: true
        default: "20,4"
        type: string
        description: "Scene parcel coordinates (x,y)"
      baseUrl:
        required: true
        default: "https://peer.decentraland.zone"
        type: string
        description: "Catalyst server URL"

jobs:
  generate-lod:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: unityci/editor:6000.2.6f2-linux-il2cpp-3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          token: ${{ secrets.REPOS_READ_ONLY_TOKEN || github.token }}

      - name: Activate Unity license
        run: |
          mkdir -p /root/.local/share/unity3d/Unity
          echo "$UNITY_LICENSE" > /root/.local/share/unity3d/Unity/Unity_lic.ulf
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_2021_ULF }}

      - name: Install Node.js
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
          apt-get install -y nodejs

      - name: Build and run scene-lod-entities-manifest-builder
        run: |
          cd scene-lod-entities-manifest-builder
          npm ci
          npm run build
          COORDS="${{ inputs.coords || '20,4' }}"
          CATALYST="${{ inputs.baseUrl || 'https://peer.decentraland.zone' }}"
          node dist/index.js --catalyst=$CATALYST --coords=$COORDS --overwrite
          ls -la output-manifests/

      - name: Copy manifest to Unity project
        run: |
          mkdir -p asset-bundle-converter/Assets/_SceneManifest
          cp scene-lod-entities-manifest-builder/output-manifests/*-lod-manifest.json asset-bundle-converter/Assets/_SceneManifest/

      - name: Run LOD Generation
        run: |
          xvfb-run --auto-servernum --server-args='-screen 0 640x480x24' \
            unity-editor \
            -batchmode \
            -nographics \
            -projectPath "$GITHUB_WORKSPACE/asset-bundle-converter" \
            -executeMethod DCL.ABConverter.Editor.LODGeneratorWindow.GenerateLODBatchMode \
            -coords "${{ inputs.coords || '20,4' }}" \
            -baseUrl "${{ inputs.baseUrl || 'https://peer.decentraland.zone' }}" \
            -skipManifest \
            -logFile -
        timeout-minutes: 45

      - name: Upload LOD artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lod-${{ inputs.coords || '20,4' }}
          path: |
            asset-bundle-converter/Assets/_ExportedLODs/LOD_Assets/**/*
