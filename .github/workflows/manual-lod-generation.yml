name: Run LOD Generation

on:
  push:
    branches:
      - feature/lod-generator-editor
  workflow_dispatch:
    inputs:
      coords:
        required: true
        default: "20,4"
        type: string
        description: "Scene parcel coordinates (x,y)"
      baseUrl:
        required: true
        default: "https://peer.decentraland.zone"
        type: string
        description: "Catalyst server URL"

jobs:
  generate-lod:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          token: ${{ secrets.REPOS_READ_ONLY_TOKEN || github.token }}

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg COMMIT_HASH=${{ github.sha }} \
            --build-arg UNITY_DOCKER_IMAGE=unityci/editor:6000.2.6f2-webgl-3 \
            --build-arg PLATFORM_TARGET=webgl \
            -t asset-bundle-converter:lod-gen \
            .

      - name: Create Unity license
        run: mkdir -p $(pwd)/tmp/Unity && echo "$UNITY_2021_ULF" > $(pwd)/tmp/Unity/Unity_lic.ulf
        env:
          UNITY_2021_ULF: ${{ secrets.UNITY_2021_ULF }}

      - name: Run LOD Generation
        run: |
          mkdir -p $(pwd)/artifact
          docker run --name lod-gen \
            -v $(pwd)/tmp/Unity:/root/.local/share/unity3d/Unity \
            asset-bundle-converter:lod-gen \
              xvfb-run --auto-servernum --server-args='-screen 0 640x480x24' \
                unity-editor \
                -batchmode \
                -projectPath /asset-bundle-converter \
                -executeMethod DCL.ABConverter.Editor.LODGeneratorWindow.GenerateLODBatchMode \
                -coords "${{ inputs.coords || '20,4' }}" \
                -baseUrl "${{ inputs.baseUrl || 'https://peer.decentraland.zone' }}" \
                -skipMeshBaker \
                -logFile -
        timeout-minutes: 45

      - name: Copy LOD results
        if: always()
        run: |
          docker cp lod-gen:/asset-bundle-converter/Assets/_ExportedLODs/LOD_Assets $(pwd)/artifact/LOD_Assets || true
          docker cp lod-gen:/asset-bundle-converter/Assets/_ExportedLODs $(pwd)/artifact/ExportedLODs || true
          ls -laR $(pwd)/artifact/ || echo "No artifacts found"

      - name: Upload LOD artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lod-${{ inputs.coords || '20,4' }}
          path: |
            artifact/**/*
